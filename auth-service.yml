spring:
  application:
    name: auth-service
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 6000

  datasource:
    url: jdbc:mysql://localhost:3306/auth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 7777
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
server:
  port: 8081
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
jwt:
  secret: ABCDEFGHIJZKLMNOPQRSTUVWXYZ1234567890!@#$%^&*()
  access-token-expiration: 120000
