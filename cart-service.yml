spring:
  application:
    name: cart-service

  data:
    redis:
      host: localhost
      port: 6379
    mongodb:
      uri: mongodb://localhost:27017/cartdb
      uuid-representation: standard

  mongodb:
    host: localhost
    port: 27017
    database: cartdb

server:
  port: 9999 
resilience4j:
  circuitbreaker:
    instances:
      productService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
  retry:
    instances:
      productService:
        maxAttempts: 3
        waitDuration: 2s
  timelimiter:
    instances:
      productService:
        timeoutDuration: 3s
  bulkhead:
    instances:
      productService:
        maxConcurrentCalls: 10
