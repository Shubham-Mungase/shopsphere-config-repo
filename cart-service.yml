spring:
  application:
    name: cart-service

  data:
    redis:
      host: localhost
      port: 6379

  mongodb:
    host: localhost
    port: 27017
    database: cartdb
    representation:
      uuid: standard

logging:
  level:
    "[org.springframework.data.mongodb.core.MongoTemplate]": DEBUG
    "[org.mongodb.driver.protocol.command]": DEBUG
resilience4j:
  circuitbreaker:
    instances:
      ProductService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s				
  retry:
    instances:
      ProductService:
        maxAttempts: 3
        waitDuration: 2s
  timelimiter:
    instances:
      ProductService:
        timeoutDuration: 3s
  bulkhead:
    instances:
      ProductService:
        maxConcurrentCalls: 10
server:
  port: 9999						
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
