spring:
  application:
    name: service-registry
  config:
    import: optional:configserver:http://configserver:8888
    
  cloud:
    config:
      enabled: false   # 🔥 VERY IMPORTANT

server:
  port: 8761

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

  server:
    enable-self-preservation: true
