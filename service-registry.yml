server:
  port: 8761

spring:
  application:
    name: service-registry

  config:
    import: optional:configserver:http://config-server:8888

eureka:
  client:
    register-with-eureka: false   # 🔥 MUST
    fetch-registry: false         # 🔥 MUST
    service-url:
      defaultZone: http://localhost:8761/eureka/  # (ignored but safe)

  server:
    enable-self-preservation: true
